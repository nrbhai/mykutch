<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, .logo { font-family: 'Poppins', sans-serif; }
        
        .craft-hero {
            position: relative;
            height: 70vh;
            min-height: 500px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .craft-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
        }
        .hero-content-inner {
            position: relative;
            z-index: 2;
            padding: 0 1rem;
            max-width: 900px;
        }
        .hero-content-inner h1 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            margin-bottom: 1rem;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 1.5rem;
            opacity: 0.9;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .craft-section {
            padding: 6rem 0;
            display: flex;
            align-items: center;
            gap: 4rem;
        }
        .craft-section:nth-child(even) {
            flex-direction: row-reverse;
        }
        .craft-text { flex: 1; }
        .craft-image { flex: 1; }
        
        .craft-image img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 1rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .section-heading {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: var(--color-heading);
            position: relative;
            display: inline-block;
        }
        .section-heading::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--color-primary);
            margin-top: 0.5rem;
        }

        .facts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            background: #fff;
            padding: 4rem;
            border-radius: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin: 4rem 0;
        }
        .fact-card {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .fact-icon { font-size: 2rem; }

        @media (max-width: 900px) {
            .craft-section { flex-direction: column !important; gap: 2rem; padding: 4rem 0; }
            .craft-image img { height: 300px; }
            .facts-grid { padding: 2rem; }
        }
    </style>
</head>
<body>
    <nav class="scrolled">
        <div class="container nav-content">
            <a href="../index.html" class="logo">KUTCH TRAVEL</a>

                <a href="../index.html#crafts">Crafts</a>
            </div>
        </div>
    </nav>

    <header class="craft-hero" style="background-image: url('')">
        <div class="hero-content-inner reveal">

            <div class="subtitle"></div>
        </div>
    </header>

    <main class="container">
        
        

        <div class="reveal">
            <div class="facts-grid">
                <div style="grid-column: 1/-1; text-align: center; margin-bottom: 2rem;">
                    <h2 class="section-heading" style="font-size: 2rem;">Did You Know?</h2>
                </div>
                
            </div>
        </div>

        <div class="section reveal">
            <h2 class="section-heading text-center" style="display: block; text-align: center; margin-bottom: 3rem;">Gallery</h2>
            <div class="gallery-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
                
            </div>
        </div>

    </main>

    <footer class="footer-main" style="margin-top: 0;">
        <div class="container" style="text-align: center; padding: 2rem 0;">
            <p style="opacity: 0.6; font-size: 0.9rem;">&copy; 2026 Kutch Travel Guide. Designed with ❤️.</p>
        </div>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
