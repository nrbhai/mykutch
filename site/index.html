     /* Dashboard Layout */
                    .travel-dashboard {
                        display: grid;
                        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
                        gap: 2rem;
                        max-width: 1300px;
                        margin: 0 auto;
                    }

                    .dashboard-panel {
                        background: #ffffff;
                        border-radius: 1.5rem;
                        padding: 2rem;
                        box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
                        border: 1px solid rgba(0, 0, 0, 0.03);
                        transition: transform 0.3s ease;
                    }

                    .dashboard-panel:hover {
                        transform: translateY(-5px);
                    }

                    .panel-header {
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        margin-bottom: 2rem;
                        border-bottom: 2px solid #f8fafc;
                        padding-bottom: 1rem;
                    }

                    .panel-header h3 {
                        margin: 0;
                        font-family: var(--font-heading);
                        font-size: 1.25rem;
                        font-weight: 700;
                        color: var(--color-heading);
                    }

                    .panel-icon {
                        font-size: 1.25rem;
                        background: #f8fafc;
                        padding: 0.75rem;
                        border-radius: 50%;
                    }

                    /* Season Rows */
                    .season-row {
                        display: flex;
                        gap: 1.5rem;
                        padding-bottom: 1.5rem;
                        margin-bottom: 1.5rem;
                        border-bottom: 1px solid #f1f5f9;
                        position: relative;
                    }

                    .season-row:last-child {
                        border-bottom: none;
                        margin-bottom: 0;
                        padding-bottom: 0;
                    }

                    .season-meta {
                        display: flex;
                        flex-direction: column;
                        align-items: flex-start;
                        min-width: 90px;
                        gap: 0.5rem;
                    }

                    .season-month {
                        font-family: var(--font-heading);
                        font-weight: 700;
                        font-size: 0.9rem;
                        color: var(--color-heading);
                    }

                    .status-badge {
                        font-size: 0.65rem;
                        font-weight: 800;
                        padding: 0.25rem 0.6rem;
                        border-radius: 20px;
                        text-transform: uppercase;
                        letter-spacing: 0.05em;
                    }

                    .status-best {
                        background: #ecfccb;
                        color: #3f6212;
                    }

                    .status-good {
                        background: #fff7ed;
                        color: #9a3412;
                    }

                    .status-avoid {
                        background: #fef2f2;
                        color: #991b1b;
                    }

                    .season-info h4 {
                        margin: 0 0 0.25rem 0;
                        font-size: 0.95rem;
                        color: #1e293b;
                    }

                    .season-info p {
                        font-size: 0.85rem;
                        color: #64748b;
                        margin: 0 0 0.5rem 0;
                        line-height: 1.4;
                    }

                    .season-temp {
                        display: inline-block;
                        font-size: 0.8rem;
                        font-weight: 600;
                        color: var(--color-primary);
                        background: #fff7ed;
                        padding: 0.15rem 0.6rem;
                        border-radius: 4px;
                    }

                    /* Transport Rows */
                    .transport-row {
                        display: flex;
                        align-items: flex-start;
                        gap: 1.25rem;
                        margin-bottom: 1.5rem;
                    }

                    .transport-row:last-child {
                        margin-bottom: 0;
                    }

                    .transport-icon-box {
                        font-size: 1.25rem;
                        background: #f1f5f9;
                        width: 48px;
                        height: 48px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        border-radius: 12px;
                        flex-shrink: 0;
                    }

                    .transport-info h4 {
                        margin: 0;
                        font-size: 1rem;
                        font-weight: 700;
                        color: var(--color-heading);
                    }

                    .transport-info .highlight {
                        margin: 0.2rem 0;
                        font-weight: 600;
                        color: var(--color-primary);
                        font-size: 0.9rem;
                    }

                    .transport-info .sub {
                        font-size: 0.8rem;
                        color: #64748b;
                    }

                    @media (max-width: 640px) {
                        .travel-dashboard {
                            grid-template-columns: 1fr;
                        }

                        .season-row {
                            gap: 1rem;
                        }

                        .season-meta {
                            min-width: 70px;
                        }

                        .tips-grid {
                            grid-template-columns: 1fr;
                        }
                    }

                    /* Utility for Full Width */
                    .full-width {
                        grid-column: 1 / -1;
                        margin-top: 3rem;
                    }

                    /* Tips Grid */
                    .tips-grid {
                        display: grid;
                        grid-template-columns: repeat(3, 1fr);
                        gap: 1.5rem;
                    }

                    .tip-item {
                        display: flex;
                        align-items: flex-start;
                        gap: 1rem;
                        background: #f8fafc;
                        padding: 1rem 1.25rem;
                        border-radius: 1rem;

                    .tip-icon {

                    .tip-content h4 {
                        margin: 0 0 0.25rem 0;

                    }

                    .tip-content p {
