                    .status-avoid {
                        background: #fef2f2;
                        color: #991b1b;
                    }

                    .season-info h4 {
                        margin: 0 0 0.25rem 0;
                        font-size: 0.95rem;
                        color: #1e293b;
                    }

                    .season-info p {
                        font-size: 0.85rem;
                        color: #64748b;
                        margin: 0 0 0.5rem 0;
                        line-height: 1.4;
                    }

                    .season-temp {
                        display: inline-block;
                        font-size: 0.8rem;
                        font-weight: 600;
                        color: var(--color-primary);
                        background: #fff7ed;
                        padding: 0.15rem 0.6rem;
                        border-radius: 4px;
                    }

                    /* Transport Rows */
                    .transport-row {
                        display: flex;
                        align-items: flex-start;
                        gap: 1.25rem;
                        margin-bottom: 1.5rem;
                    }

                    .transport-row:last-child {
                        margin-bottom: 0;
                    }

                    .transport-icon-box {
                        font-size: 1.25rem;
                        background: #f1f5f9;
                        width: 48px;
                        height: 48px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        border-radius: 12px;
                        flex-shrink: 0;
                    }

                    .transport-info h4 {
                        margin: 0;
                        font-size: 1rem;
                        font-weight: 700;
                        color: var(--color-heading);
                    }

                    .transport-info .highlight {
                        margin: 0.2rem 0;
                        font-weight: 600;
                        color: var(--color-primary);
                        font-size: 0.9rem;
                    }

                    .transport-info .sub {
                        font-size: 0.8rem;
                        color: #64748b;
                    }

                    @media (max-width: 640px) {
                        .travel-dashboard {
                            grid-template-columns: 1fr;
                        }

                        .season-row {
                            gap: 1rem;
                        }

                        .season-meta {
                            min-width: 70px;
                        }

                        .tips-grid {
                            grid-template-columns: 1fr;
                        }
                    }

                    /* Utility for Full Width */
                    .full-width {
                        grid-column: 1 / -1;
                        margin-top: 3rem;
                    }

                    /* Tips Grid */
                    .tips-grid {
                        display: grid;
                        grid-template-columns: repeat(3, 1fr);

                    .tip-item {
